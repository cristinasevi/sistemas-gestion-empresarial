<h1>Guardar personalizado</h1>
<form method="post">
    {% csrf_token %}
    {% for field in form %}
        <div class="field-container">
            {{ field.label_tag }}
            {{ field }}
            {% if field.errors %}
                <ul class="errorlist">
                    {% for error in field.errors %}
                        <li style="color: red;">{{ error }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        </div>
    {% endfor %}
    
    <button type="submit">Guardar producto</button>
</form>
